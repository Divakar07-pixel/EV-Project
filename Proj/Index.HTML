<!DOCTYPE html>
<html>
<head>
    <title>EV Charging Network</title>
    <style>
        body { font-family: Arial; background:#f4f6f8; padding:20px }
        h1 { text-align:center }
        .card { background:white; padding:15px; margin:10px; border-radius:8px }
        table { width:100%; border-collapse:collapse }
        th, td { padding:10px; border:1px solid #ccc }
        th { background:#333; color:white }
        .stats { display:flex; gap:15px }
    </style>
</head>
<body>

<h1>⚡ EV Charging Network</h1>

<div class="stats">
    <div class="card">Total: {{ total }}</div>
    <div class="card">India: {{ india }}</div>
    <div class="card">USA: {{ usa }}</div>
    <div class="card">Fast Chargers: {{ fast }}</div>
</div>

<hr>

<form method="get">
    <select name="search_type">
        <option value="city">City</option>
        <option value="country">Country</option>
    </select>
    <input type="text" name="search" placeholder="Search">
    <button>Search</button>
</form>

<hr>

<table>
<tr>
    <th>ID</th><th>Location</th><th>City</th><th>Country</th><th>Type</th>
</tr>
{% for s in stations %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[6] }}</td>
</tr>
{% endfor %}
</table>

<hr>

<h3>Add Station</h3>
<form method="post" action="/add_station">
    <input name="location_name" placeholder="Location" required>
    <input name="city" placeholder="City" required>
    <input name="country" placeholder="Country" required>
    <input name="latitude" placeholder="Latitude" required>
    <input name="longitude" placeholder="Longitude" required>
    <select name="charger_type">
        <option>Level 2</option>
        <option>DC Fast</option>
    </select>
    <button>Add</button>
</form>

</body>
</html>
